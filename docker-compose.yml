version: '3.9'
services:
  strmthumbnail:
    build: .
    image: yourname/strmthumbnail:latest
    container_name: strmthumbnail
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./config/strmthumbnail:/app/data
      - ./strm:/media
    environment:
      - TZ=Asia/Shanghai
